# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e0d0700268c0d0467bf53827f56bd4b5"
name = "hh-shipping-poc"
application_url = "https://hh-shipping.onrender.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_delivery_customizations,write_delivery_customizations,read_discounts,write_discounts,read_validations,write_validations"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [
  "https://hh-shipping.onrender.com/auth/callback",
  "https://hh-shipping.onrender.com/auth/shopify/callback",
  "https://hh-shipping.onrender.com/api/auth/callback",
  "https://hh-shipping.onrender.com/api/auth"
]

[build]
automatically_update_urls_on_dev = true
