query CartDeliveryOptionsDiscountsGenerateRunInput($productTags: [String!]! = []) {
  shop {
    metafield(namespace: "$app:hh-control-room", key: "control-config") {
      jsonValue
    }
  }
  cart {
    discountCodes: attribute(key: "_hh_discount_codes") {
      value
    }
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            dynamicTags: hasTags(tags: $productTags) {
              tag
              hasTag
            }
          }
        }
      }
    }
    deliveryGroups {
      id
      deliveryAddress {
        countryCode
      }
      deliveryOptions {
        handle
        title
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "$app:hh-shipping-discount", key: "function-configuration") {
      jsonValue
    }
  }
}
