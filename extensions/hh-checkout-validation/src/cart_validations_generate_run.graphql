query CartValidationsGenerateRunInput($productTags: [String!]! = []) {
  validation {
    metafield(namespace: "$app:hh-checkout-validation", key: "function-configuration") {
      jsonValue
    }
  }
  buyerJourney {
    step
  }
  cart {
    discountCodes: attribute(key: "_hh_discount_codes") {
      value
    }
    cost {
      subtotalAmount {
        amount
      }
    }
    lines {
      quantity
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            dynamicTags: hasTags(tags: $productTags) {
              tag
              hasTag
            }
          }
        }
      }
    }
  }
}
